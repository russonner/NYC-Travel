name: Radar · Import orders

# Trae órdenes COMPLETAS de Radar (activas o históricas) → staging de AP360.
# Se dispara solo (schedule = todas las activas), desde AP360 (repository_dispatch
# [radar-import]) o manual. El schedule mantiene VIVAS las piezas/OC de cada orden
# activa sin depender del dispatch de la app (que exige GITHUB_PAT): en el evento
# 'schedule' se importa RADAR_ORDER_NUMBERS=ALL (todas las activas del catálogo).
on:
  schedule:
    - cron: "43 */3 * * *"   # cada 3 h: re-importa TODAS las activas (piezas + OC)
  workflow_dispatch:
    inputs:
      order_numbers:
        description: "Números de orden (coma). Activas o históricas por número. Ej. 591,404"
        required: false
        default: ""
      criterion:
        description: "Histórico por criterio: ORDERNUMBER|PLATES|VIN|SINISTERNUMBER|INVOICE"
        required: false
        default: ""
      search:
        description: "Valor a buscar en histórico (con criterion)."
        required: false
        default: ""
      branch:
        description: "Sucursal."
        required: false
        default: "UNIVERSIDAD"
      order_from:
        description: "BACKFILL: folio inicial del rango (con order_to). Ej. 1"
        required: false
        default: ""
      order_to:
        description: "BACKFILL: folio final del rango (con order_from). Ej. 200"
        required: false
        default: ""
      solo_piezas:
        description: "1 = solo refacciones (sin fotos/PDF), para la base de conocimiento de compras."
        required: false
        default: ""
  repository_dispatch:
    types: [radar-import]

concurrency:
  group: radar-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar Playwright
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@1.47.2
          npx playwright install --with-deps chromium
      - name: Importar de Radar
        run: node scripts/radar-import.mjs
        env:
          RADAR_USER: ${{ secrets.RADAR_USER }}
          RADAR_PASS: ${{ secrets.RADAR_PASS }}
          RADAR_INGEST_TOKEN: ${{ secrets.RADAR_INGEST_TOKEN }}
          RADAR_ORDER_NUMBERS: ${{ github.event.inputs.order_numbers || github.event.client_payload.order_numbers || (github.event_name == 'schedule' && 'ALL') || '' }}
          RADAR_CRITERION: ${{ github.event.inputs.criterion || github.event.client_payload.criterion }}
          RADAR_SEARCH: ${{ github.event.inputs.search || github.event.client_payload.search }}
          RADAR_BRANCH: ${{ github.event.inputs.branch || github.event.client_payload.branch || 'UNIVERSIDAD' }}
          RADAR_ORDER_FROM: ${{ github.event.inputs.order_from || github.event.client_payload.order_from }}
          RADAR_ORDER_TO: ${{ github.event.inputs.order_to || github.event.client_payload.order_to }}
          RADAR_SOLO_PIEZAS: ${{ github.event.inputs.solo_piezas || github.event.client_payload.solo_piezas }}
          SUPABASE_IMPORT_FN_URL: "https://rrxakcjuykyoxzdfgthg.supabase.co/functions/v1/radar-import-orden"
          SUPABASE_ANON: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyeGFrY2p1eWt5b3h6ZGZndGhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMjA4NjUsImV4cCI6MjA5MzY5Njg2NX0.K5TPot2ATsFqL3jkYPODbXwr8i9OQmjgD5lNi-l5CyI"
