name: Radar Sync

# Sincroniza las órdenes de Radar Control Total con el tablero.
# - Automático cada 30 minutos
# - Manual desde la pestaña Actions (Run workflow)
# - Por API (el botón del tablero) vía repository_dispatch
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [radar-sync]

concurrency:
  group: radar-sync
  # No cancelar una corrida a medias (perdería el guardado); las corridas se encolan.
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar Playwright
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@1.47.2
          npx playwright install --with-deps chromium
      - name: Sincronizar desde Radar
        run: node scripts/radar-sync.mjs
        env:
          RADAR_USER: ${{ secrets.RADAR_USER }}
          RADAR_PASS: ${{ secrets.RADAR_PASS }}
          RADAR_INGEST_TOKEN: ${{ secrets.RADAR_INGEST_TOKEN }}
          SUPABASE_FN_URL: "https://rrxakcjuykyoxzdfgthg.supabase.co/functions/v1/radar-ingest"
