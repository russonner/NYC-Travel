name: Radar · Discover historical search

# Descubre el endpoint del buscador de Histórico (/Historical) = órdenes cerradas.
on:
  workflow_dispatch:
    inputs:
      search:
        description: "Valor a buscar (un No. de orden CERRADA de prueba)."
        required: true
        default: ""
      search_by:
        description: "Buscar por: orden | placas | vin | siniestro | factura"
        required: false
        default: "orden"
      branch:
        description: "Sucursal."
        required: false
        default: "UNIVERSIDAD"

concurrency:
  group: radar-historical-discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar Playwright
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@1.47.2
          npx playwright install --with-deps chromium
      - name: Descubrir buscador de histórico
        run: |
          set -o pipefail
          node scripts/radar-historical-discover.mjs 2>&1 | tee historical-discover.txt
        env:
          RADAR_USER: ${{ secrets.RADAR_USER }}
          RADAR_PASS: ${{ secrets.RADAR_PASS }}
          RADAR_SEARCH: ${{ github.event.inputs.search }}
          RADAR_SEARCH_BY: ${{ github.event.inputs.search_by }}
          RADAR_BRANCH: ${{ github.event.inputs.branch }}
      - name: Subir resultado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-historical-discover
          path: historical-discover.txt
          retention-days: 7
